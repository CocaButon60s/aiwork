services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile_comfyui
    ports:
      - "8188:8188"
    tty: true
    runtime: nvidia
    shm_size: '4gb'
    volumes:
      - ../share:/app
    working_dir: /app
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    entrypoint: /entrypoint.sh

  ai:
    image: ollama/ollama
    runtime: nvidia
    shm_size: '4gb'
    ports:
      - "11434:11434"
    volumes:
      - ../ollama:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

